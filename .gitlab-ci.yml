variables:
  VERSION_TAG_REGEX: /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/
  PACKAGE_FILE: standalone-build.tar.gz
  PACKAGE_URL: $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/fusion/$CI_COMMIT_TAG/$PACKAGE_FILE

stages:
  - state
  - test
  - deploy
  - hook

build development package:
  stage: state
  image: valvoid/fusion:1.2.1
  script:
    - fusion build log.serializers.stream.threshold=debug
  artifacts:
    name: dev-package-build
    paths:
      - dependencies
      - state

analyze code:
  stage: test
  image:
    name: ghcr.io/phpstan/phpstan:2.1.6
    entrypoint: [""]
  needs:
    - job: build development package
      artifacts: true
  script:
    - phpstan analyse -c phpstan.neon --error-format gitlab > phpstan.json
  artifacts:
    paths:
      - phpstan.json
    reports:
      codequality: phpstan.json

test units:
  stage: test
  image: php:$VERSION-alpine
  before_script:
    - apk add --no-cache libzip-dev linux-headers
    - apk add --update --no-cache --virtual .build-dependencies $PHPIZE_DEPS
    - pecl install xdebug
    - docker-php-ext-enable xdebug
    - docker-php-ext-configure zip
    - docker-php-ext-install zip
    - echo "xdebug.mode=coverage" >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
  needs:
    - job: build development package
      artifacts: true
  parallel:
    matrix:
      - VERSION: ["8.2", "8.3", "8.4", "8.5"]
  coverage: /^coverage:\s\d{1,3}(?:\.\d{1,2})?\%/
  script:
    - php tests/units.php
    - php reflex units

test integrations:
  stage: test
  image: php:8.2.0
  rules:
    - if: $CI_COMMIT_TAG =~ $VERSION_TAG_REGEX
  needs:
    - job: test units
      artifacts: true
  script:
    - php reflex integrations

build standalone package:
  stage: deploy
  image: valvoid/fusion:1
  variables:
    GIT_STRATEGY: empty
  rules:
    - if: $CI_COMMIT_TAG =~ $VERSION_TAG_REGEX
  dependencies: []
  script:
    - fusion build build.source=gitlab.com/valvoid/fusion/\'code/==$CI_COMMIT_TAG
    - touch $PACKAGE_FILE
    - tar --exclude=$PACKAGE_FILE -czvf $PACKAGE_FILE .
    - |
      curl -v --fail-with-body --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
      --upload-file $PACKAGE_FILE \
      $PACKAGE_URL

create release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_STRATEGY: none
  rules:
    - if: $CI_COMMIT_TAG =~ $VERSION_TAG_REGEX
  needs:
    - job: build standalone package
      artifacts: false
  script:
    - echo "running release job for the tag \"$CI_COMMIT_TAG\"."
  release:
    tag_name: $CI_COMMIT_TAG
    assets:
      links:
        - name: Standalone package (tar.gz)
          url: $PACKAGE_URL
          link_type: package
    description: |
      $CI_COMMIT_TAG_MESSAGE

      ---
      Created by using the release-cli in:
      [Pipeline]($CI_PIPELINE_URL) / [Job]($CI_JOB_URL)

build docker image:
  stage: hook
  rules:
    - if: $CI_COMMIT_TAG =~ $VERSION_TAG_REGEX
  variables:
    SEMVER: $CI_COMMIT_TAG
  trigger:
    project: valvoid/fusion/docker
    branch: main